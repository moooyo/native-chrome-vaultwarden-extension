# Keeps GitHub Actions SHA pins and npm dependencies current.
# The github-actions ecosystem bumps the pinned commit SHAs in the workflows
# (the `# vX.Y.Z` comments are updated alongside), so pinning stays low-effort.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
