name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to rebuild and publish
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Verify, package, and publish
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ format('refs/tags/{0}', env.RELEASE_TAG) }}
          fetch-depth: 0

      - name: Verify immutable release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          if ! git show-ref --verify --quiet "refs/tags/$RELEASE_TAG"; then
            echo "::error::Release tag '$RELEASE_TAG' does not exist. Manual runs can only rebuild an existing tag."
            exit 1
          fi
          tag_commit="$(git rev-list -n 1 "$RELEASE_TAG")"
          head_commit="$(git rev-parse HEAD)"
          if [[ "$tag_commit" != "$head_commit" ]]; then
            echo "::error::Checked-out commit '$head_commit' does not match tag '$RELEASE_TAG' at '$tag_commit'."
            exit 1
          fi
          echo "commit=$tag_commit" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build production extension
        run: npm run build:prod

      - name: Prepare and verify release assets
        id: release
        run: npm run release:prepare -- --tag "$RELEASE_TAG"

      - name: Upload verified release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ steps.release.outputs.tag }}
          path: |
            ${{ steps.release.outputs.archive_path }}
            ${{ steps.release.outputs.checksum_path }}
          if-no-files-found: error
          retention-days: 7

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          TAG_COMMIT: ${{ steps.tag.outputs.commit }}
          ARCHIVE_PATH: ${{ steps.release.outputs.archive_path }}
          CHECKSUM_PATH: ${{ steps.release.outputs.checksum_path }}
          PRERELEASE: ${{ steps.release.outputs.prerelease }}
        shell: bash
        run: |
          set -euo pipefail
          release_flags=(--title "$TAG")
          if [[ "$PRERELEASE" == "true" ]]; then
            release_flags+=(--prerelease)
          else
            release_flags+=(--prerelease=false)
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            remote_commit="$(git rev-list -n 1 "$TAG")"
            if [[ "$remote_commit" != "$TAG_COMMIT" ]]; then
              echo "::error::Existing release tag '$TAG' does not resolve to the verified commit."
              exit 1
            fi
            gh release edit "$TAG" "${release_flags[@]}"
            gh release upload "$TAG" "$ARCHIVE_PATH" "$CHECKSUM_PATH" --clobber
          else
            gh release create "$TAG" "$ARCHIVE_PATH" "$CHECKSUM_PATH" \
              "${release_flags[@]}" \
              --target "$TAG_COMMIT" \
              --verify-tag \
              --generate-notes
          fi
